<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>vh-board</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background: #0f172a;
      color: #e2e8f0;
    }
    header {
      background: #1e293b;
      padding: 0.75rem 1rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid #334155;
      position: sticky;
      top: 0;
      z-index: 10;
      gap: 0.75rem;
      flex-wrap: wrap;
    }
    header h1 { margin: 0; font-size: 1.1rem; color: #38bdf8; white-space: nowrap; }
    .controls { display: flex; gap: 0.5rem; align-items: center; flex-wrap: wrap; }
    select, input, button {
      background: #334155;
      color: #e2e8f0;
      border: 1px solid #475569;
      border-radius: 0.375rem;
      padding: 0.35rem 0.5rem;
      font-size: 0.85rem;
    }
    button { cursor: pointer; }
    button:hover { background: #475569; }
    button.primary { background: #2563eb; border-color: #2563eb; }
    button.primary:hover { background: #1d4ed8; }
    button.danger { background: #dc2626; border-color: #dc2626; }
    button.danger:hover { background: #b91c1c; }
    .project-sidebar {
      position: fixed;
      left: 0;
      top: 60px;
      bottom: 0;
      width: 44px;
      background: #0f172a;
      border-right: 1px solid #334155;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding-top: 0.5rem;
      z-index: 9;
      gap: 0.4rem;
    }
    .sidebar-header {
      width: 32px;
      height: 32px;
      border-radius: 6px;
      background: #1e293b;
      border: 1px solid #334155;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.75rem;
      font-weight: 700;
      color: #94a3b8;
      cursor: default;
    }
    .sidebar-icons {
      display: flex;
      flex-direction: column;
      gap: 0.4rem;
      align-items: center;
    }
    .sidebar-icon {
      width: 32px;
      height: 32px;
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.7rem;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.15s, box-shadow 0.15s;
      position: relative;
    }
    .sidebar-icon:hover {
      transform: scale(1.08);
      box-shadow: 0 0 8px currentColor;
    }
    .sidebar-icon .tooltip {
      display: none;
      position: absolute;
      left: 40px;
      top: 50%;
      transform: translateY(-50%);
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 4px;
      padding: 0.2rem 0.5rem;
      font-size: 0.75rem;
      white-space: nowrap;
      z-index: 20;
      pointer-events: none;
      color: #e2e8f0;
    }
    .sidebar-icon:hover .tooltip {
      display: block;
    }
    .sidebar-icon.active {
      box-shadow: 0 0 0 2px rgba(56,189,248,0.5);
    }
    /* Shift board right to make room for sidebar */
    body.has-sidebar .board {
      margin-left: 44px;
    }
    .board {
      display: grid;
      grid-template-columns: repeat(6, 1fr);
      gap: 0.75rem;
      padding: 1rem;
      overflow-x: auto;
      min-height: calc(100vh - 70px);
    }
    .column {
      background: #1e293b;
      border-radius: 0.5rem;
      display: flex;
      flex-direction: column;
      min-width: 240px;
      max-height: calc(100vh - 90px);
    }
    .column-header {
      padding: 0.6rem 0.75rem;
      font-weight: 600;
      text-transform: capitalize;
      border-bottom: 1px solid #334155;
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 0.9rem;
    }
    .column-header .count {
      background: #334155;
      border-radius: 999px;
      padding: 0.1rem 0.45rem;
      font-size: 0.75rem;
    }
    .column-body {
      padding: 0.5rem;
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
      overflow-y: auto;
      min-height: 60px;
    }
    .card {
      background: #0f172a;
      border: 1px solid #334155;
      border-radius: 0.375rem;
      padding: 0.6rem;
      cursor: grab;
      transition: box-shadow 0.15s;
    }
    .card:hover { border-color: #38bdf8; box-shadow: 0 0 0 1px #38bdf8; }
    .card-title { font-weight: 500; font-size: 0.9rem; margin-bottom: 0.3rem; }
    .card-meta {
      font-size: 0.75rem;
      color: #94a3b8;
      display: flex;
      flex-wrap: wrap;
      gap: 0.35rem;
      align-items: center;
      margin-top: 0.3rem;
    }
    .chip {
      display: inline-flex;
      align-items: center;
      gap: 0.25rem;
      padding: 0.1rem 0.35rem;
      border-radius: 0.25rem;
      font-size: 0.7rem;
      font-weight: 500;
    }
    .chip.type-bug { background: rgba(220,38,38,0.2); color: #f87171; }
    .chip.type-feature { background: rgba(37,99,235,0.2); color: #60a5fa; }
    .chip.type-chore { background: rgba(107,114,128,0.2); color: #cbd5e1; }
    .chip.priority-urgent { background: rgba(220,38,38,0.2); color: #f87171; }
    .chip.priority-high { background: rgba(234,179,8,0.2); color: #facc15; }
    .chip.priority-medium { background: rgba(56,189,248,0.2); color: #7dd3fc; }
    .chip.priority-low { background: rgba(16,185,129,0.2); color: #6ee7b7; }
    .label-chip { font-size: 0.7rem; padding: 0.1rem 0.35rem; border-radius: 0.25rem; }
    .assignee-chip { font-size: 0.7rem; padding: 0.1rem 0.35rem; border-radius: 0.25rem; background: #334155; }
    .column.collapsed { min-width: 60px; max-width: 80px; }
    .column.collapsed .column-header { writing-mode: vertical-rl; text-orientation: mixed; padding: 0.5rem 0.25rem; justify-content: center; }
    .status-backlog .column-header { color: #94a3b8; }
    .status-in-progress .column-header { color: #38bdf8; }
    .status-code-review .column-header { color: #a78bfa; }
    .status-uat .column-header { color: #fbbf24; }
    .status-completed .column-header { color: #4ade80; }
    .status-features-of-the-future .column-header { color: #c084fc; }
    .toast {
      position: fixed;
      bottom: 1rem;
      right: 1rem;
      background: #1e293b;
      border: 1px solid #334155;
      padding: 0.75rem 1rem;
      border-radius: 0.375rem;
      font-size: 0.85rem;
      opacity: 0;
      transition: opacity 0.3s;
      pointer-events: none;
      z-index: 100;
    }
    .toast.show { opacity: 1; }

    /* Modal */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.7);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 50;
      padding: 1rem;
    }
    .modal-overlay.open { display: flex; }
    .modal {
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 0.5rem;
      width: 100%;
      max-width: 520px;
      max-height: 90vh;
      overflow-y: auto;
      padding: 1rem;
    }
    #taskModal { max-width: 1200px; }
    .modal h2 { margin: 0 0 0.75rem; font-size: 1.1rem; }
    .form-group { margin-bottom: 0.75rem; }
    .form-group label { display: block; font-size: 0.8rem; color: #94a3b8; margin-bottom: 0.25rem; }
    .form-group input, .form-group textarea, .form-group select {
      width: 100%;
      background: #0f172a;
      color: #e2e8f0;
      border: 1px solid #475569;
      border-radius: 0.375rem;
      padding: 0.4rem 0.5rem;
      font-size: 0.9rem;
    }
    .form-group textarea { min-height: 80px; resize: vertical; }
    .modal-actions { display: flex; gap: 0.5rem; justify-content: flex-end; margin-top: 1rem; }
    .label-picker { display: flex; flex-wrap: wrap; gap: 0.35rem; margin-top: 0.25rem; }
    .label-option { cursor: pointer; padding: 0.2rem 0.5rem; border-radius: 0.25rem; border: 2px solid transparent; opacity: 0.7; font-size: 0.75rem; }
    .label-option.selected { opacity: 1; border-color: #e2e8f0; }
    .sprint-info { font-size: 0.8rem; color: #94a3b8; }

    /* Drag & drop */
    .column-body.drag-over {
      background: rgba(56, 189, 248, 0.08);
      box-shadow: inset 0 0 0 2px rgba(56, 189, 248, 0.4);
      border-radius: 0.375rem;
      transition: background 0.15s, box-shadow 0.15s;
    }
    .card.drag-over-card {
      border-top: 2px solid #38bdf8;
      margin-top: -2px;
    }
    body.dragging .column-body {
      min-height: 80px;
    }
    .card.dragging {
      opacity: 0.4;
    }

    /* Task modal grid layout */
    .task-grid {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr 1fr;
      gap: 0.75rem;
      margin-bottom: 0.75rem;
    }
    .task-grid .form-group { margin-bottom: 0; }
    .task-grid .span-2 { grid-column: span 2; }
    .task-grid .span-3 { grid-column: span 3; }
    .task-grid .span-4 { grid-column: span 4; }
    .task-grid .full-width { grid-column: 1 / -1; }
    #taskView { display: flex; flex-direction: column; gap: 0; }
    #taskView .bottom-section { margin-top: 0; }
    .bottom-section { display: flex; flex-direction: column; gap: 0.75rem; }
    #taskFeed { padding-right: 0.25rem; }
    .feed-item { padding: 0.4rem 0; border-bottom: 1px solid #334155; }
    .feed-item:last-child { border-bottom: none; }
    .feed-item .meta { font-size: 0.7rem; opacity: 0.7; display: flex; justify-content: space-between; align-items: flex-start; }
    .feed-item .body { font-size: 0.85rem; margin-top: 0.15rem; }
    .comment-action-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 22px;
      height: 22px;
      border: 1px solid #475569;
      border-radius: 4px;
      background: #1e293b;
      cursor: pointer;
      font-size: 0.75rem;
      line-height: 1;
      margin-left: 0.25rem;
      opacity: 0;
      transition: opacity 0.15s, background 0.15s, color 0.15s;
      vertical-align: middle;
    }
    .feed-item:hover .comment-action-btn,
    div[style*="display:flex"]:hover .comment-action-btn {
      opacity: 1;
    }
    .comment-edit-btn {
      color: #fbbf24;
      border-color: rgba(251,191,36,0.3);
    }
    .comment-edit-btn:hover {
      background: rgba(251,191,36,0.15);
      color: #fcd34d;
    }
    .comment-delete-btn {
      color: #f87171;
      border-color: rgba(248,113,113,0.3);
    }
    .comment-delete-btn:hover {
      background: rgba(248,113,113,0.15);
      color: #fca5a5;
    }
    #runningSessions a:hover { text-decoration: underline !important; }
    .task-title-bar {
      background: #1e40af;
      margin: -1rem -1rem 0 -1rem;
      padding: 0.75rem 1rem;
      border-radius: 0.5rem 0.5rem 0 0;
      position: sticky;
      top: -1rem;
      z-index: 5;
      display: flex;
      justify-content: space-between;
      align-items: baseline;
    }
    .task-title-bar .title-text {
      font-size: 1.15rem;
      font-weight: 600;
      color: #fff;
    }
    .task-title-bar .task-number {
      font-size: 0.75rem;
      color: rgba(255,255,255,0.6);
    }

    @media (max-width: 1200px) {
      .board { grid-template-columns: repeat(3, 1fr); }
    }
    @media (max-width: 768px) {
      .board { grid-template-columns: 1fr; }
      .column { max-height: none; }
    }
  </style>
</head>
<body>
  <header>
    <h1><a href="/">vh-board</a></h1>
    <div class="controls">
      <select id="sprintFilter"><option value="">All Sprints</option></select>
      <button id="activeSprintBtn" style="font-size:0.75rem;padding:0.35rem 0.5rem">Active Sprint</button>
      <select id="assigneeFilter"><option value="">All Assignees</option></select>
      <select id="labelFilter"><option value="">All Labels</option></select>
      <input type="text" id="searchInput" placeholder="Search title or description…" />
      <button id="searchBtn">Search</button>
      <label style="display:flex;align-items:center;gap:0.3rem;font-size:0.8rem;color:#94a3b8;cursor:pointer">
        <input type="checkbox" id="archivedToggle" /> Show archived
      </label>
      <select id="sortSelect">
        <option value="order-asc">Order ↑</option>
        <option value="order-desc">Order ↓</option>
        <option value="priority-asc">Priority ↑</option>
        <option value="priority-desc">Priority ↓</option>
        <option value="created_at-desc">Newest</option>
        <option value="created_at-asc">Oldest</option>
      </select>
      <button id="addTaskBtn" class="primary">+ Task</button>
      <button id="refreshBtn" title="Refresh now">&#x21bb;</button>
      <select id="autoRefreshSelect" title="Auto refresh">
        <option value="0">Auto: Off</option>
        <option value="5000">5s</option>
        <option value="10000">10s</option>
        <option value="30000">30s</option>
        <option value="60000">1m</option>
        <option value="300000">5m</option>
      </select>
      <button id="labelsBtn">Labels</button>
      <button id="peopleBtn">People</button>
      <button id="sprintBtn">Sprints</button>
      <button id="exportJsonBtn" title="Export JSON" style="font-size:0.75rem">⬇ JSON</button>
      <button id="exportCsvBtn" title="Export CSV" style="font-size:0.75rem">⬇ CSV</button>
      <label style="font-size:0.75rem;cursor:pointer">
        <span>⬆ Import</span>
        <input type="file" id="importJsonInput" accept=".json" style="display:none" />
      </label>
      <button id="statsBtn">Stats</button>
    </div>
  </header>
  <aside class="project-sidebar" id="projectSidebar">
    <div class="sidebar-header" title="Projects">P</div>
    <div class="sidebar-icons" id="sidebarIcons"></div>
  </aside>
  <main class="board" id="board"></main>
  <div class="toast" id="toast"></div>

  <!-- Task Modal -->
  <div class="modal-overlay" id="taskModalOverlay">
    <div class="modal" id="taskModal">
      <div id="taskView">
      <div class="task-title-bar">
        <span class="title-text" id="vTitle"></span>
        <span class="task-number" id="vTaskNumber"></span>
      </div>
      <div class="task-grid">
        <div class="form-group span-4"><label>Description</label><div id="vDesc" style="white-space:pre-wrap;max-height:200px;overflow-y:auto;padding:0.5rem;background:#0f172a;border-radius:0.375rem;margin-top:0.25rem"></div></div>
        <div class="form-group"><label>Type</label><div id="vType"></div></div>
        <div class="form-group"><label>Status</label><div id="vStatus"></div></div>
        <div class="form-group"><label>Priority</label><div id="vPriority"></div></div>
        <div class="form-group"><label>Sprint</label><div id="vSprint"></div></div>
        <div class="form-group"><label>Assignee</label><div id="vAssignee"></div></div>
        <div class="form-group"><label>Labels</label><div id="vLabels"></div></div>
        <div class="form-group"><label>Due Date</label><div id="vDueDate"></div></div>
        <div class="form-group"><label>Estimate</label><div id="vEstimate"></div></div>
        <div class="form-group"><label>Depends On</label><div id="vDependsOn"></div></div>
        <div class="form-group"><label>Blocking</label><div id="vBlocking"></div></div>
      </div>
      <div class="bottom-section">
        <div class="form-group"><label>Subtasks <span id="subtaskCount"></span></label><div id="vSubtasks"></div></div>
        <div class="form-group" style="display:flex;gap:0.5rem">
          <input id="addSubtaskInput" placeholder="New subtask…" style="flex:1" />
          <button id="addSubtaskBtn" class="primary" style="font-size:0.8rem;padding:0.35rem 0.6rem">Add</button>
        </div>
        <div class="form-group" id="runningSessionsGroup" style="display:none">
          <label>🟢 Running Sessions</label>
          <div id="runningSessions" style="font-size:0.85rem;background:#1e293b;border:1px solid #334155;border-radius:0.5rem;padding:0.75rem"></div>
        </div>
        <div class="form-group"><label>Activity & Comments</label><div id="taskFeed" style="font-size:0.85rem"></div></div>
        <div class="form-group" style="display:flex;gap:0.5rem;align-items:flex-start">
          <textarea id="addCommentInput" placeholder="Add a comment… (Shift+Enter or Ctrl+Enter to post)" style="flex:1;min-height:36px;font-size:0.85rem" rows="10"></textarea>
          <button id="addCommentBtn" class="primary" style="font-size:0.8rem;padding:0.35rem 0.6rem;margin-top:0">Post</button>
        </div>
      </div>
      <div class="modal-actions">
        <button id="archiveTaskBtn" class="primary" style="background:#16a34a;border-color:#16a34a" title="Archive/Restore task">Archive</button>
        <button id="deleteTaskBtn" class="danger">Delete</button>
        <button id="duplicateTaskBtn">Duplicate</button>
        <button id="editTaskBtn">Edit</button>
        <button id="closeTaskBtn">Close</button>
      </div>
    </div><div id="taskEdit" style="display:none">
      <input type="hidden" id="eId" />
      <div class="task-grid">
        <div class="form-group span-4"><label>Title</label><input id="eTitle" /></div>
        <div class="form-group span-4"><label>Description</label><textarea id="eDesc"></textarea></div>
        <div class="form-group"><label>Type</label><select id="eType"><option value="bug">Bug</option><option value="feature">Feature</option><option value="chore">Chore</option></select></div>
        <div class="form-group"><label>Status</label><select id="eStatus"><option value="backlog">Backlog</option><option value="in-progress">In Progress</option><option value="code-review">Code Review</option><option value="uat">UAT</option><option value="completed">Completed</option><option value="features-of-the-future">Features of the Future</option></select></div>
        <div class="form-group"><label>Priority</label><select id="ePriority"><option value="urgent">Urgent</option><option value="high">High</option><option value="medium">Medium</option><option value="low">Low</option></select></div>
        <div class="form-group"><label>Sprint</label><select id="eSprint"><option value="">None</option></select></div>
        <div class="form-group"><label>Assignee</label><select id="eAssignee"><option value="">Unassigned</option></select></div>
        <div class="form-group"><label>Labels</label><div class="label-picker" id="eLabels"></div></div>
        <div class="form-group"><label>Due Date</label><input id="eDueDate" type="datetime-local" /></div>
        <div class="form-group"><label>Estimate</label><input id="eEstimate" type="number" min="0" placeholder="Story points" /></div>
        <div class="form-group"><label>Depends On</label>
          <div style="display:flex;gap:0.3rem;align-items:flex-start">
            <select id="eDependsOn" multiple style="flex:1;min-height:60px;background:#0f172a;color:#e2e8f0;border:1px solid #475569;border-radius:0.375rem;padding:0.4rem 0.5rem;font-size:0.9rem"></select>
          </div>
          <div style="font-size:0.75rem;opacity:0.6;margin-top:0.2rem">Ctrl/Cmd+click to toggle selection</div>
        </div>
      </div>
      <div class="modal-actions">
        <button id="cancelEditBtn">Cancel</button>
        <button id="saveTaskBtn" class="primary">Save</button>
      </div>
    </div>
  </div>
</div>
  <!-- Add Task Modal -->
  <div class="modal-overlay" id="addModalOverlay">
    <div class="modal">
      <h2>New Task</h2>
      <div class="form-group"><label>Title</label><input id="nTitle" /></div>
      <div class="form-group"><label>Description</label><textarea id="nDesc"></textarea></div>
      <div class="form-group"><label>Type</label><select id="nType"><option value="feature">Feature</option><option value="bug">Bug</option><option value="chore">Chore</option></select></div>
      <div class="form-group"><label>Status</label><select id="nStatus"><option value="backlog">Backlog</option><option value="in-progress">In Progress</option><option value="code-review">Code Review</option><option value="uat">UAT</option><option value="completed">Completed</option><option value="features-of-the-future">Features of the Future</option></select></div>
      <div class="form-group"><label>Priority</label><select id="nPriority"><option value="medium">Medium</option><option value="urgent">Urgent</option><option value="high">High</option><option value="low">Low</option></select></div>
      <div class="form-group"><label>Sprint</label><select id="nSprint"><option value="">None</option></select></div>
      <div class="form-group"><label>Assignee</label><select id="nAssignee"><option value="">Unassigned</option></select></div>
      <div class="form-group"><label>Labels <span style="color:#f87171" title="Required">*</span></label><div class="label-picker" id="nLabels"></div></div>
      <div class="form-group"><label>Due Date</label><input id="nDueDate" type="datetime-local" /></div>
      <div class="form-group"><label>Estimate</label><input id="nEstimate" type="number" min="0" placeholder="Story points" /></div>
      <div class="form-group"><label>Depends On</label>
          <div style="display:flex;gap:0.3rem;align-items:flex-start">
            <select id="nDependsOn" multiple style="flex:1;min-height:60px;background:#0f172a;color:#e2e8f0;border:1px solid #475569;border-radius:0.375rem;padding:0.4rem 0.5rem;font-size:0.9rem"></select>
          </div>
          <div style="font-size:0.75rem;opacity:0.6;margin-top:0.2rem">None pre-selected. Ctrl/Cmd+click to select dependencies.</div></div>
      <div class="modal-actions">
        <button id="cancelAddBtn">Cancel</button>
        <button id="createTaskBtn" class="primary">Create</button>
      </div>
    </div>
  </div>

  <!-- Labels Modal -->
  <div class="modal-overlay" id="labelsModalOverlay">
    <div class="modal">
      <h2>Labels</h2>
      <div style="display:flex;gap:0.5rem;margin-bottom:0.75rem">
        <input id="lName" placeholder="Name" />
        <input id="lColor" placeholder="#38bdf8" value="#38bdf8" style="width:100px" />
        <button id="addLabelBtn" class="primary">Add</button>
      </div>
      <div id="labelsList"></div>
      <div class="modal-actions">
        <button id="closeLabelsBtn">Close</button>
      </div>
    </div>
  </div>

  <!-- People Modal -->
  <div class="modal-overlay" id="peopleModalOverlay">
    <div class="modal">
      <h2>People</h2>
      <div style="display:flex;gap:0.5rem;margin-bottom:0.75rem">
        <input id="pName" placeholder="Name" />
        <input id="pColor" placeholder="#4ade80" value="#4ade80" style="width:100px" />
        <button id="addPersonBtn" class="primary">Add</button>
      </div>
      <div id="peopleList"></div>
      <div class="modal-actions">
        <button id="closePeopleBtn">Close</button>
      </div>
    </div>
  </div>

  <!-- Sprints Modal -->
  <div class="modal-overlay" id="sprintsModalOverlay">
    <div class="modal">
      <h2>Sprints</h2>
      <div style="display:flex;gap:0.5rem;margin-bottom:0.75rem;flex-wrap:wrap">
        <input id="sName" placeholder="Sprint name" />
        <input id="sStart" type="date" />
        <input id="sEnd" type="date" />
        <button id="addSprintBtn" class="primary">Create</button>
      </div>
      <div id="sprintsList"></div>
      <div class="modal-actions">
        <button id="closeSprintsBtn">Close</button>
      </div>
    </div>
  </div>

  <!-- Stats Modal -->
  <div class="modal-overlay" id="statsModalOverlay">
    <div class="modal" style="max-width:640px">
      <h2>Board Stats</h2>
      <div id="statsContent"></div>
      <div class="modal-actions">
        <button id="closeStatsBtn">Close</button>
      </div>
    </div>
  </div>

  <script>
    const STATUSES = ['backlog','in-progress','code-review','uat','completed','features-of-the-future'];
    const boardEl = document.getElementById('board');
    const sprintFilterEl = document.getElementById('sprintFilter');
    const searchInputEl = document.getElementById('searchInput');
    const searchBtn = document.getElementById('searchBtn');
    const sortSelect = document.getElementById('sortSelect');
    const refreshBtn = document.getElementById('refreshBtn');
    const autoRefreshSelect = document.getElementById('autoRefreshSelect');
    const toastEl = document.getElementById('toast');
    let autoRefreshInterval = null;

    let allLabels = [];
    let allPeople = [];
    let allSprints = [];
    let isModalOpen = false;
    let isDragging = false;

    // Load preferences
    const savedSort = localStorage.getItem('pi-board-sort');
    if (savedSort) sortSelect.value = savedSort;
    const savedAutoRefresh = localStorage.getItem('pi-board-auto-refresh');
    if (savedAutoRefresh !== null) autoRefreshSelect.value = savedAutoRefresh;

    function showToast(msg) {
      toastEl.textContent = msg;
      toastEl.classList.add('show');
      setTimeout(() => toastEl.classList.remove('show'), 2000);
    }

    function openModal(overlayId) {
      document.getElementById(overlayId).classList.add('open');
      isModalOpen = true;
    }
    function closeModal(overlayId) {
      document.getElementById(overlayId).classList.remove('open');
      isModalOpen = false;
      if (overlayId === 'taskModalOverlay' && window.location.pathname.startsWith('/task/')) {
        window.history.pushState({}, '', '/');
      }
    }

    async function api(url, opts) {
      const res = await fetch(url, opts);
      if (!res.ok) throw new Error((await res.json()).error || 'Request failed');
      return res.json();
    }

    async function fetchTasks() {
      const params = new URLSearchParams();
      if (sprintFilterEl.value) params.set('sprint_id', sprintFilterEl.value);
      const assigneeFilter = document.getElementById('assigneeFilter').value;
      if (assigneeFilter) params.set('assignee_id', assigneeFilter);
      const labelFilter = document.getElementById('labelFilter').value;
      if (labelFilter) params.set('label_ids', labelFilter);
      const search = searchInputEl.value.trim();
      if (search) params.set('search', search);
      const [sortBy, sortOrder] = sortSelect.value.split('-');
      if (sortBy) { params.set('sort_by', sortBy); params.set('sort_order', sortOrder); }
      if (document.getElementById('archivedToggle').checked) params.set('archived', '1');
      const url = '/api/tasks' + (params.toString() ? '?' + params.toString() : '');
      const data = await api(url);
      return data.tasks || [];
    }

    async function fetchAllTasks() {
      const data = await api('/api/tasks');
      return data.tasks || [];
    }

    async function fetchSprints() {
      const data = await api('/api/sprints');
      allSprints = data.sprints || [];
      return data;
    }

    async function fetchLabels() {
      const data = await api('/api/labels');
      allLabels = data.labels || [];
      return allLabels;
    }

    async function fetchPeople() {
      const data = await api('/api/people');
      allPeople = data.people || [];
      return allPeople;
    }

    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    function renderMarkdown(text) {
      if (!text) return '';
      let html = escapeHtml(text);
      html = html.replace(/^#### (.*$)/gim, '<h4>$1</h4>');
      html = html.replace(/^### (.*$)/gim, '<h3>$1</h3>');
      html = html.replace(/^## (.*$)/gim, '<h2>$1</h2>');
      html = html.replace(/^# (.*$)/gim, '<h1>$1</h1>');
      html = html.replace(/\*\*(.*?)\*\*/gim, '<b>$1</b>');
      html = html.replace(/\*(.*?)\*/gim, '<i>$1</i>');
      html = html.replace(/`([^`]+)`/gim, '<code style="background:#0f172a;padding:0.1rem 0.3rem;border-radius:0.25rem;font-size:0.85em">$1</code>');
      html = html.replace(/^- (.*$)/gim, '<li>$1</li>');
      html = html.replace(/\n/gim, '<br>');
      return html;
    }

    function renderLabelChips(labels) {
      if (!labels || labels.length === 0) return '';
      return labels.map(l => `<span class="label-chip" style="background:${escapeHtml(l.color)}22;color:${escapeHtml(l.color)}">${escapeHtml(l.name)}</span>`).join('');
    }

    function renderCard(task) {
      const isBlocked = task.depends_on && task.depends_on.some(d => d.status !== 'completed');
      const div = document.createElement('div');
      div.className = 'card';
      div.draggable = true;
      div.dataset.id = task.id;
      div.innerHTML = `
        <div style="display:flex;justify-content:space-between;align-items:flex-start;gap:0.3rem">
          <div class="card-title" style="flex:1"><a href="/task/${task.id}" style="color:inherit;text-decoration:none">${escapeHtml(task.title)}</a></div>
          <button class="card-menu-btn" style="background:none;border:none;color:#94a3b8;cursor:pointer;font-size:1rem;line-height:1;padding:0.1rem" title="Move to…">⋯</button>
        </div>
        <div class="card-meta">
          <span class="chip type-${task.type}">${task.type}</span>
          <span class="chip priority-${task.priority}">${task.priority}</span>
          ${task.estimate ? `<span class="chip">${task.estimate}pt</span>` : ''}
          ${isBlocked ? `<span class="chip" style="background:rgba(220,38,38,0.3);color:#f87171">blocked</span>` : ''}
          ${task.assignee ? `<span class="assignee-chip" style="background:${task.assignee.color}22;color:${task.assignee.color}">${escapeHtml(task.assignee.name)}</span>` : ''}
        </div>
        <div class="card-meta">${renderLabelChips(task.labels)}</div>
      `;
      div.addEventListener('dragstart', (e) => {
        isDragging = true;
        document.body.classList.add('dragging');
        e.dataTransfer.setData('text/plain', task.id);
        e.dataTransfer.effectAllowed = 'move';
        div.classList.add('dragging');
      });
      div.addEventListener('dragend', () => {
        isDragging = false;
        document.body.classList.remove('dragging');
        div.classList.remove('dragging');
        document.querySelectorAll('.column-body.drag-over').forEach(el => el.classList.remove('drag-over'));
        document.querySelectorAll('.card.drag-over-card').forEach(el => el.classList.remove('drag-over-card'));
      });
      // Intra-column drag: highlight card above drop target
      div.addEventListener('dragover', (e) => {
        e.preventDefault();
        e.stopPropagation();
        document.querySelectorAll('.card.drag-over-card').forEach(el => el.classList.remove('drag-over-card'));
        e.dataTransfer.dropEffect = 'move';
        const draggedId = e.dataTransfer.getData('text/plain');
        if (draggedId && Number(draggedId) !== task.id) {
          div.classList.add('drag-over-card');
        }
      });
      div.addEventListener('dragleave', (e) => {
        div.classList.remove('drag-over-card');
      });
      // Drop on card to reorder within same column
      div.addEventListener('drop', async (e) => {
        e.preventDefault();
        e.stopPropagation();
        div.classList.remove('drag-over-card');
        const draggedId = Number(e.dataTransfer.getData('text/plain'));
        if (!draggedId || draggedId === task.id) return;
        // Find both cards' status and reorder
        const parentColumn = div.closest('.column-body');
        const targetStatus = parentColumn ? parentColumn.dataset.status : null;
        if (!targetStatus) return;
        try {
          // Get all tasks in this column
          const allTasks = await fetchAllTasks();
          const columnTasks = allTasks.filter(t => t.status === targetStatus).sort((a, b) => (a.order || 0) - (b.order || 0));
          // Build new order: insert dragged task before target
          const newOrder = [];
          for (const ct of columnTasks) {
            if (ct.id === draggedId) continue; // skip dragged
            if (ct.id === task.id) {
              newOrder.push(draggedId); // insert dragged before target
            }
            newOrder.push(ct.id);
          }
          // Update order for each task in the column
          for (let i = 0; i < newOrder.length; i++) {
            await api(`/api/tasks/${newOrder[i]}`, {
              method: 'PATCH',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({ status: targetStatus, order: i, author: 'Vandan' })
            });
          }
          showToast('Reordered');
          await renderBoard();
        } catch (err) {
          showToast('Reordering failed: ' + err.message);
        }
      });
      div.addEventListener('click', (e) => {
        if (isDragging) return; // don't open modal after drag
        if (e.target.closest('.card-menu-btn')) return;
        if (e.target.closest('a')) return;
        openTaskModal(task.id);
      });
      div.querySelector('.card-menu-btn').addEventListener('click', (e) => {
        e.stopPropagation();
        const status = prompt(`Move task #${task.id} to status:\n${STATUSES.join(', ')}`, task.status);
        if (status && STATUSES.includes(status) && status !== task.status) {
          api(`/api/tasks/${task.id}/move`, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ status, order: task.order, author: 'Vandan' }) })
            .then(() => { showToast('Task moved'); renderBoard(); })
            .catch(err => showToast(err.message));
        }
      });
      return div;
    }

    let columnSettings = [];
    async function fetchColumnSettings() {
      const data = await api('/api/columns');
      columnSettings = data.settings || [];
    }

    async function renderBoard() {
      const tasks = await fetchTasks();
      const nowIso = new Date().toISOString().slice(0, 19).replace('T', ' ');
      const overdue = tasks.filter(t => t.due_date && t.due_date < nowIso && t.status !== 'completed');
      if (overdue.length > 0) {
        showToast(`⚠️ ${overdue.length} overdue task${overdue.length > 1 ? 's' : ''}`);
      }
      await fetchColumnSettings();
      boardEl.innerHTML = '';
      const collapsedCols = JSON.parse(localStorage.getItem('pi-board-collapsed') || '[]');
      for (const status of STATUSES) {
        const col = document.createElement('div');
        const isCollapsed = collapsedCols.includes(status);
        col.className = `column status-${status}` + (isCollapsed ? ' collapsed' : '');
        const statusTasks = tasks.filter(t => t.status === status);
        const wip = columnSettings.find(c => c.status === status);
        const overWip = wip && wip.wip_limit > 0 && statusTasks.length > wip.wip_limit;
        col.innerHTML = `
          <div class="column-header" style="${overWip ? 'background:rgba(220,38,38,0.15);border-color:rgba(220,38,38,0.4)' : ''}">
            <span>${status.replace(/-/g, ' ')}${wip && wip.wip_limit > 0 ? ` <span style="font-size:0.7rem;opacity:0.7">(${statusTasks.length}/${wip.wip_limit})</span>` : ''}</span>
            <span style="display:flex;align-items:center;gap:0.4rem">
              <span class="count">${statusTasks.length}</span>
              <button class="collapse-btn" data-status="${status}" style="background:none;border:none;color:#94a3b8;cursor:pointer;font-size:0.8rem;padding:0.1rem">${isCollapsed ? '▸' : '▾'}</button>
            </span>
          </div>
          <div class="column-body" data-status="${status}" style="${isCollapsed ? 'display:none' : ''}"></div>
        `;
        const body = col.querySelector('.column-body');
        statusTasks.forEach((task, idx) => {
          body.appendChild(renderCard(task));
        });
        body.addEventListener('dragenter', (e) => { e.preventDefault(); body.classList.add('drag-over'); });
        body.addEventListener('dragleave', (e) => { body.classList.remove('drag-over'); });
        body.addEventListener('dragover', (e) => { e.preventDefault(); e.dataTransfer.dropEffect = 'move'; });
        body.addEventListener('drop', async (e) => {
          // Only handle drop directly on column body (not on cards within it)
          if (e.target !== body && !e.target.classList.contains('column-body')) return;
          e.preventDefault();
          document.querySelectorAll('.column-body.drag-over').forEach(el => el.classList.remove('drag-over'));
          const draggedId = e.dataTransfer.getData('text/plain');
          const id = Number(draggedId);
          const newStatus = body.dataset.status;
          if (!id || !newStatus) return;
          try {
            await api(`/api/tasks/${id}/move`, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ status: newStatus, order: 0, author: 'Vandan' }) });
            showToast('Task moved');
            await renderBoard();
          } catch (err) {
            showToast('Failed to move task: ' + err.message);
          }
        });
        col.querySelector('.collapse-btn').addEventListener('click', () => {
          let collapsed = JSON.parse(localStorage.getItem('pi-board-collapsed') || '[]');
          if (collapsed.includes(status)) {
            collapsed = collapsed.filter(s => s !== status);
            col.classList.remove('collapsed');
            col.querySelector('.column-body').style.display = '';
            col.querySelector('.collapse-btn').textContent = '▾';
          } else {
            collapsed.push(status);
            col.classList.add('collapsed');
            col.querySelector('.column-body').style.display = 'none';
            col.querySelector('.collapse-btn').textContent = '▸';
          }
          localStorage.setItem('pi-board-collapsed', JSON.stringify(collapsed));
        });
        boardEl.appendChild(col);
      }
    }

    async function populateSprintFilter() {
      await fetchSprints();
      const current = sprintFilterEl.value;
      sprintFilterEl.innerHTML = '<option value="">All Sprints</option>';
      for (const s of allSprints) {
        const opt = document.createElement('option');
        opt.value = s.id;
        opt.textContent = `${s.name} (${s.status})`;
        if (String(s.id) === current) opt.selected = true;
        sprintFilterEl.appendChild(opt);
      }
    }

    async function populateAssigneeFilter() {
      await fetchPeople();
      const current = document.getElementById('assigneeFilter').value;
      document.getElementById('assigneeFilter').innerHTML = '<option value="">All Assignees</option>' + allPeople.map(p => `<option value="${p.id}">${escapeHtml(p.name)}</option>`).join('');
      document.getElementById('assigneeFilter').value = current;
    }

    async function populateLabelFilter() {
      await fetchLabels();
      const current = document.getElementById('labelFilter').value;
      document.getElementById('labelFilter').innerHTML = '<option value="">All Labels</option>' + allLabels.map(l => `<option value="${l.id}">${escapeHtml(l.name)}</option>`).join('');
      document.getElementById('labelFilter').value = current;
    }

    function populateSelect(selectEl, items, valueKey, textFn, emptyLabel) {
      const val = selectEl.value;
      selectEl.innerHTML = emptyLabel ? `<option value="">${emptyLabel}</option>` : '';
      for (const item of items) {
        const opt = document.createElement('option');
        opt.value = item[valueKey];
        opt.textContent = textFn(item);
        selectEl.appendChild(opt);
      }
      selectEl.value = val;
    }

    async function populateDependencySelect(selectEl, excludeId, selectedIds) {
      const data = await api('/api/tasks');
      const tasks = (data.tasks || []).filter(t => t.id !== excludeId);
      selectEl.innerHTML = '';
      for (const task of tasks) {
        const opt = document.createElement('option');
        opt.value = task.id;
        opt.textContent = `#${task.id} ${task.title} [${task.status}]`;
        if (selectedIds.includes(task.id)) opt.selected = true;
        selectEl.appendChild(opt);
      }
    }

    function renderLabelPicker(containerId, selectedIds = []) {
      const container = document.getElementById(containerId);
      container.innerHTML = '';
      for (const label of allLabels) {
        const span = document.createElement('span');
        span.className = 'label-option' + (selectedIds.includes(label.id) ? ' selected' : '');
        span.style.background = label.color + '33';
        span.style.color = label.color;
        span.textContent = label.name;
        span.dataset.id = label.id;
        span.addEventListener('click', () => span.classList.toggle('selected'));
        container.appendChild(span);
      }
    }

    function getSelectedLabelIds(containerId) {
      return Array.from(document.querySelectorAll(`#${containerId} .label-option.selected`)).map(el => Number(el.dataset.id));
    }

    // ── Running Sessions panel ───────────────────────────────────────────
    let runningSessionsInterval = null;

    async function renderRunningSessions(taskId) {
      const container = document.getElementById('runningSessions');
      const group = document.getElementById('runningSessionsGroup');
      if (!container || !group) return;

      // Clear previous polling
      if (runningSessionsInterval) clearInterval(runningSessionsInterval);

      async function refresh() {
        try {
          const { sessions } = await api(`/api/tasks/${taskId}/sessions`);
          if (!sessions || sessions.length === 0) {
            group.style.display = 'none';
            return;
          }
          group.style.display = '';
          container.innerHTML = sessions.map(s => {
            const elapsed = Math.round((Date.now() - new Date(s.startedAt).getTime()) / 1000);
            const elapsedStr = elapsed < 60 ? `${elapsed}s` : `${Math.floor(elapsed/60)}m ${elapsed%60}s`;
            const statusIcon = s.status === 'stopping' ? '🛑' : s.status === 'stuck' ? '⚠️' : '🟢';
            const obsUrl = `http://localhost:43190/session/${s.uid}`;
            return `<div style="display:flex;align-items:center;justify-content:space-between;padding:4px 0;border-bottom:1px solid #334155">
              <div style="flex:1">
                ${statusIcon} <strong>${escapeHtml(s.sandboxName || 'workflow')}</strong>
                <span style="opacity:0.6;margin-left:8px">iter ${s.iteration} · ${elapsedStr}</span>
              </div>
              <div style="display:flex;gap:6px">
                <a href="${obsUrl}" target="_blank" style="color:#38bdf8;font-size:0.8rem;text-decoration:none">View Live →</a>
                <button onclick="stopSession('${s.uid}', ${taskId})" style="background:#dc2626;color:#fff;border:none;border-radius:3px;padding:2px 8px;font-size:0.75rem;cursor:pointer">Stop</button>
              </div>
            </div>`;
          }).join('');
        } catch {}
      }

      await refresh();
      runningSessionsInterval = setInterval(refresh, 3000);
    }

    // Global stopSession function
    window.stopSession = async function(uid, taskId) {
      if (!confirm('Stop this workflow session?')) return;
      try {
        await api(`/api/sessions/${uid}/stop`, { method: 'POST', body: JSON.stringify({ reason: 'user_requested' }) });
        await renderRunningSessions(taskId);
      } catch(e) { alert('Failed to stop: ' + e.message); }
    };

    function renderFeed(task) {
      const container = document.getElementById('taskFeed');
      const items = [];
      
      // Add activity entries
      if (task.activity) {
        for (const a of task.activity) {
          const fromTo = a.old_value && a.new_value ? ` ${escapeHtml(a.old_value)} → ${escapeHtml(a.new_value)}` : a.new_value ? `: ${escapeHtml(a.new_value)}` : '';
          const activityAuthor = a.author || 'pm-vh';
          items.push({
            type: 'activity',
            timestamp: a.created_at,
            id: a.id,
            taskId: task.id,
            html: `<span style="color:#38bdf8">${escapeHtml(activityAuthor)}</span> — ${new Date(a.created_at + ' UTC').toLocaleString()} — ${a.action}${fromTo} <button class="comment-action-btn comment-delete-btn" data-activity-id="${a.id}" data-task-id="${task.id}" title="Remove entry">✕</button>`
          });
        }
      }
      
      // Add comment entries
      if (task.comments) {
        for (const c of task.comments) {
          items.push({
            type: 'comment',
            timestamp: c.created_at,
            id: c.id,
            taskId: task.id,
            html: `<span style="color:#38bdf8">${escapeHtml(c.author)}</span> — <span style="opacity:0.6">${new Date(c.created_at + ' UTC').toLocaleString()}</span> <button class="comment-action-btn comment-edit-btn" data-comment-id="${c.id}" data-task-id="${task.id}" title="Edit comment">✎</button> <button class="comment-action-btn comment-delete-btn" data-comment-id="${c.id}" data-task-id="${task.id}" title="Delete comment">✕</button>`,
            bodyHtml: renderMarkdown(c.body)
          });
        }
      }
      
      // Sort by timestamp
      items.sort((a, b) => (a.timestamp || '').localeCompare(b.timestamp || ''));
      
      if (items.length === 0) {
        container.innerHTML = '<span style="opacity:0.6">No activity or comments yet</span>';
        return;
      }
      
      container.innerHTML = items.map(item => `
        <div class="feed-item">
          <div style="display:flex;align-items:baseline;gap:0.3rem;font-size:0.85rem">
            ${item.type === 'comment' ? '<span style="color:#38bdf8;flex-shrink:0">💬</span>' : '<span style="color:#94a3b8;flex-shrink:0">⚙️</span>'}
            <span>${item.html}</span>
          </div>
          ${item.type === 'comment' && item.bodyHtml ? `<div style="margin-top:0.15rem;font-size:0.85rem">${item.bodyHtml}</div>` : ''}
        </div>
      `).join('');
      
      // Wire up activity delete buttons
      setTimeout(() => {
        container.querySelectorAll('[data-activity-id]').forEach(btn => {
          btn.addEventListener('click', async (e) => {
            e.stopPropagation();
            const activityId = Number(btn.dataset.activityId);
            const tid = Number(btn.dataset.taskId);
            if (!confirm('Remove this activity entry?')) return;
            try {
              await api('/api/activity/' + activityId, { method: 'DELETE' });
              const { task } = await api('/api/tasks/' + tid);
              renderFeed(task);
            } catch (err) {
              showToast('Failed to remove activity entry: ' + err.message);
            }
          });
        });

        container.querySelectorAll('.comment-delete-btn').forEach(btn => {
          btn.addEventListener('click', async (e) => {
            e.stopPropagation();
            const commentId = Number(btn.dataset.commentId);
            const tid = Number(btn.dataset.taskId);
            if (!confirm('Delete this comment?')) return;
            try {
              await api('/api/comments/' + commentId, { method: 'DELETE' });
              const { task } = await api('/api/tasks/' + tid);
              renderFeed(task);
            } catch (err) {
              showToast('Failed to delete comment: ' + err.message);
            }
          });
        });
        // Wire up comment edit buttons
        container.querySelectorAll('.comment-edit-btn').forEach(btn => {
          btn.addEventListener('click', async (e) => {
            e.stopPropagation();
            const commentId = Number(btn.dataset.commentId);
            const tid = Number(btn.dataset.taskId);
            const feedItem = btn.closest('.feed-item');
            const bodyDiv = feedItem.querySelector('div:nth-child(2)');
            const oldBody = bodyDiv ? bodyDiv.textContent : '';
            if (bodyDiv) {
              bodyDiv.innerHTML = `<textarea style="width:100%;min-height:40px;font-size:0.85rem;background:#1e293b;color:#e2e8f0;border:1px solid #334155;border-radius:0.25rem;padding:0.3rem">${escapeHtml(oldBody)}</textarea>
                <div style="display:flex;gap:0.3rem;margin-top:0.2rem">
                  <button class="comment-save-btn" style="background:#334155;color:#e2e8f0;border:none;border-radius:0.25rem;padding:0.15rem 0.5rem;font-size:0.7rem;cursor:pointer">Save</button>
                  <button class="comment-cancel-btn" style="background:transparent;color:#94a3b8;border:none;border-radius:0.25rem;padding:0.15rem 0.5rem;font-size:0.7rem;cursor:pointer">Cancel</button>

                const { task } = await api('/api/tasks/' + tid);
                renderFeed(task);
              });
              bodyDiv.querySelector('.comment-save-btn').addEventListener('click', async () => {
                const newBody = bodyDiv.querySelector('textarea').value;
                try {
                  await api('/api/comments/' + commentId, { method: 'PATCH', headers: {'Content-Type':'application/json'}, body: JSON.stringify({ body: newBody }) });
                  const { task } = await api('/api/tasks/' + tid);

                } catch (err) {
                  showToast('Failed to update comment: ' + err.message);

    function renderComments(task) {
      const container = document.getElementById('vComments');
      if (!task.comments || task.comments.length === 0) {
        container.innerHTML = '<span style="opacity:0.6">No comments</span>';
        return;
      }
      container.innerHTML = task.comments.map(c => `
        <div style="margin:0.3rem 0;padding:0.3rem;background:#0f172a;border-radius:0.25rem">
          <div style="display:flex;justify-content:space-between;align-items:flex-start">
            <div style="font-size:0.7rem;opacity:0.7;margin-bottom:0.1rem">${escapeHtml(c.author)} — ${new Date(c.created_at).toLocaleString()}</div>
            <div>
              <button class="comment-edit-btn" data-comment-id="${c.id}" data-task-id="${task.id}" style="background:none;border:none;color:#fbbf24;cursor:pointer;font-size:0.8rem;padding:0;line-height:1" title="Edit comment">✎</button>
              <button class="comment-delete-btn" data-comment-id="${c.id}" data-task-id="${task.id}" style="background:none;border:none;color:#f87171;cursor:pointer;font-size:0.8rem;padding:0;line-height:1" title="Delete comment">×</button>
            </div>
          </div>
          <div class="comment-body-div" style="font-size:0.85rem">${renderMarkdown(c.body)}</div>
        </div>
      `).join('');
      // Wire up comment delete buttons (setTimeout to ensure DOM updated)
      setTimeout(() => {
        container.querySelectorAll('.comment-delete-btn').forEach(btn => {
          btn.addEventListener('click', async (e) => {
            e.stopPropagation();
            const commentId = Number(btn.dataset.commentId);
            const tid = Number(btn.dataset.taskId);
            if (!confirm('Delete this comment?')) return;
            try {
              await api('/api/comments/' + commentId, { method: 'DELETE' });
              const { task } = await api('/api/tasks/' + tid);
              renderComments(task);
              renderFeed(task);
            } catch (err) {
              showToast('Failed to delete comment: ' + err.message);
            }
          });
        });
        // Wire up comment edit buttons
        container.querySelectorAll('.comment-edit-btn').forEach(btn => {
          btn.addEventListener('click', async (e) => {
            e.stopPropagation();
            const commentId = Number(btn.dataset.commentId);
            const tid = Number(btn.dataset.taskId);
            const commentDiv = btn.closest('div').parentElement.parentElement;
            const bodyDiv = commentDiv.querySelector('.comment-body-div');
            const oldBody = bodyDiv.textContent;
            bodyDiv.innerHTML = `<textarea style="width:100%;min-height:40px;font-size:0.85rem;background:#1e293b;color:#e2e8f0;border:1px solid #334155;border-radius:0.25rem;padding:0.3rem">${escapeHtml(oldBody)}</textarea>
              <div style="display:flex;gap:0.3rem;margin-top:0.2rem">
                <button class="comment-save-btn" style="background:#334155;color:#e2e8f0;border:none;border-radius:0.25rem;padding:0.15rem 0.5rem;font-size:0.7rem;cursor:pointer">Save</button>
                <button class="comment-cancel-btn" style="background:transparent;color:#94a3b8;border:none;border-radius:0.25rem;padding:0.15rem 0.5rem;font-size:0.7rem;cursor:pointer">Cancel</button>
              </div>`;
            const cancelBtn = bodyDiv.querySelector('.comment-cancel-btn');
            cancelBtn.addEventListener('click', async () => {
              const { task } = await api('/api/tasks/' + tid);
              renderComments(task);
            });
            bodyDiv.querySelector('.comment-save-btn').addEventListener('click', async () => {
              const newBody = bodyDiv.querySelector('textarea').value;
              try {
                await api('/api/comments/' + commentId, { method: 'PATCH', headers: {'Content-Type':'application/json'}, body: JSON.stringify({ body: newBody }) });
                const { task } = await api('/api/tasks/' + tid);
                renderComments(task);
                renderFeed(task);
              } catch (err) {
                showToast('Failed to update comment: ' + err.message);
              }
            });
          });
        });
      }, 0);
    }

    function renderSubtasks(task) {
      const container = document.getElementById('vSubtasks');
      const countEl = document.getElementById('subtaskCount');
      if (!task.subtasks || task.subtasks.length === 0) {
        container.innerHTML = '<span style="opacity:0.6">None</span>';
        countEl.textContent = '';
        return;
      }
      const completed = task.subtasks.filter(s => s.completed).length;
      countEl.textContent = `(${completed}/${task.subtasks.length})`;
      container.innerHTML = task.subtasks.map(s => `
        <div class="subtask-item" data-id="${s.id}" style="display:flex;align-items:center;gap:0.5rem;margin:0.2rem 0">
          <input type="checkbox" ${s.completed ? 'checked' : ''} data-action="toggle" data-id="${s.id}" />
          <span style="flex:1;${s.completed ? 'text-decoration:line-through;opacity:0.6' : ''}">${escapeHtml(s.title)}</span>
          <button data-action="delete" data-id="${s.id}" style="background:none;border:none;color:#f87171;cursor:pointer;font-size:0.8rem">×</button>
        </div>
      `).join('');
      container.querySelectorAll('[data-action="toggle"]').forEach(el => {
        el.addEventListener('change', async () => {
          try {
            await api(`/api/subtasks/${el.dataset.id}/toggle`, { method: 'POST' });
            const { task } = await api(`/api/tasks/${task.id}`);
            renderSubtasks(task);
            await renderBoard();
          } catch (err) { showToast(err.message); }
        });
      });
      container.querySelectorAll('[data-action="delete"]').forEach(el => {
        el.addEventListener('click', async () => {
          try {
            await api(`/api/subtasks/${el.dataset.id}`, { method: 'DELETE' });
            const { task } = await api(`/api/tasks/${task.id}`);
            renderSubtasks(task);
            await renderBoard();
          } catch (err) { showToast(err.message); }
        });
      });
    }

    // Task detail / edit modal
    async function openTaskModal(taskId) {
      const { task } = await api(`/api/tasks/${taskId}`);
      document.getElementById('vTaskNumber').textContent = `Task #${task.id}`;
      document.getElementById("vTitle").textContent = task.title;
      document.getElementById('vDesc').innerHTML = renderMarkdown(task.description) || '<span style="opacity:0.6">(none)</span>';
      document.getElementById('vType').innerHTML = `<span class="chip type-${task.type}">${task.type}</span>`;
      document.getElementById('vStatus').textContent = task.status;
      document.getElementById('vPriority').innerHTML = `<span class="chip priority-${task.priority}">${task.priority}</span>`;
      const sprint = allSprints.find(s => s.id === task.sprint_id);
      document.getElementById('vSprint').textContent = sprint ? sprint.name : 'None';
      document.getElementById('vAssignee').innerHTML = task.assignee ? `<span class="assignee-chip" style="background:${task.assignee.color}22;color:${task.assignee.color}">${task.assignee.name}</span>` : 'Unassigned';
      document.getElementById('vLabels').innerHTML = renderLabelChips(task.labels) || 'None';
      document.getElementById('vDueDate').textContent = task.due_date ? new Date(task.due_date + ' UTC').toLocaleString() : 'None';
      document.getElementById('vEstimate').textContent = task.estimate ? `${task.estimate} points` : 'None';
      const deps = task.depends_on || [];
      document.getElementById('vDependsOn').innerHTML = deps.length > 0
        ? deps.map(d => `<span class="chip">#${d.id} ${escapeHtml(d.title)} (${d.status})</span>`).join(' ')
        : 'None';
      document.getElementById('vBlocking').innerHTML = task.blocking && task.blocking.length > 0
        ? task.blocking.map(b => `<span class="chip">#${b.id} ${escapeHtml(b.title)} (${b.status})</span>`).join(' ')
        : 'None';
      renderSubtasks(task);
      document.getElementById('addSubtaskInput').dataset.taskId = task.id;
      // Set archive button text based on current archived state
      document.getElementById('archiveTaskBtn').textContent = task.archived ? 'Unarchive' : 'Archive';
      renderFeed(task);
      renderRunningSessions(task.id);
      document.getElementById('addCommentInput').dataset.taskId = task.id;

      // Edit form
      document.getElementById('eId').value = task.id;
      document.getElementById('eTitle').value = task.title;
      document.getElementById('eDesc').value = task.description || '';
      document.getElementById('eType').value = task.type;
      document.getElementById('eStatus').value = task.status;
      document.getElementById('ePriority').value = task.priority;
      populateSelect(document.getElementById('eSprint'), allSprints, 'id', s => s.name, 'None');
      document.getElementById('eSprint').value = task.sprint_id || '';
      populateSelect(document.getElementById('eAssignee'), allPeople, 'id', p => p.name, 'Unassigned');
      document.getElementById('eAssignee').value = task.assignee_id || '';
      renderLabelPicker('eLabels', task.labels.map(l => l.id));
      document.getElementById('eDueDate').value = task.due_date || '';
      document.getElementById('eEstimate').value = task.estimate || '';
      populateDependencySelect(document.getElementById('eDependsOn'), task.id, task.depends_on.map(d => d.id));

      document.getElementById('taskView').style.display = '';
      document.getElementById('taskEdit').style.display = 'none';
      openModal('taskModalOverlay');
      window.history.pushState({}, '', '/task/' + task.id);
    }

    function postComment() {
      const input = document.getElementById('addCommentInput');
      const body = input.value.trim();
      const taskId = Number(input.dataset.taskId);
      if (!body || !taskId) return;
      api('/api/comments', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ task_id: taskId, body, author: 'Vandan' }) })
        .then(() => {
          input.value = '';

        .then(({ task }) => renderFeed(task))
        .catch(err => showToast('Failed to post comment: ' + err.message));

            showToast('Sprint completed');
            await renderSprintsList();
            await renderBoard();
            await populateSprintFilter();
          } catch (err) { showToast(err.message); }
        });

          if (!confirm('Reactivate this sprint?')) return;

            await api(`/api/sprints/${btn.dataset.id}/incomplete`, { method: 'POST' });

            await renderBoard();
            await populateSprintFilter();
          } catch (err) { showToast(err.message); }

      });

      container.querySelectorAll('.delete-sprint').forEach(btn => {
        btn.addEventListener('click', async () => {
          if (!confirm('Delete this sprint?')) return;
          try {
            await api(`/api/sprints/${btn.dataset.id}`, { method: 'DELETE' });
            showToast('Sprint deleted');
            await renderSprintsList();
            await populateSprintFilter();
            await renderBoard();
          } catch (err) { showToast(err.message); }
        });
      });
    }
    document.getElementById('sprintBtn').addEventListener('click', () => { openModal('sprintsModalOverlay'); renderSprintsList(); });
    document.getElementById('closeSprintsBtn').addEventListener('click', () => closeModal('sprintsModalOverlay'));
    document.getElementById('addSprintBtn').addEventListener('click', async () => {
      try {
        await api('/api/sprints', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ name: document.getElementById('sName').value, start_date: document.getElementById('sStart').value, end_date: document.getElementById('sEnd').value }) });
        document.getElementById('sName').value = '';
        document.getElementById('sStart').value = '';
        document.getElementById('sEnd').value = '';
        showToast('Sprint created');
        await renderSprintsList();
        await populateSprintFilter();
      } catch (err) { showToast(err.message); }
    });

    // Filters
    sprintFilterEl.addEventListener('change', renderBoard);
    document.getElementById('activeSprintBtn').addEventListener('click', async () => {
      await fetchSprints();
      const active = allSprints.find(s => s.status === 'active');
      if (active) {
        sprintFilterEl.value = active.id;
        renderBoard();
      } else {
        showToast('No active sprint');
      }
    });
    document.getElementById('assigneeFilter').addEventListener('change', renderBoard);
    document.getElementById('labelFilter').addEventListener('change', renderBoard);
    searchBtn.addEventListener('click', renderBoard);
    searchInputEl.addEventListener('keydown', (e) => { if (e.key === 'Enter') renderBoard(); });
    document.getElementById('archivedToggle').addEventListener('change', renderBoard);
    sortSelect.addEventListener('change', () => {
      localStorage.setItem('pi-board-sort', sortSelect.value);
      renderBoard();
    });

    function startAutoRefresh() {
      if (autoRefreshInterval) clearInterval(autoRefreshInterval);
      const ms = Number(autoRefreshSelect.value);
      if (ms > 0) {
        autoRefreshInterval = setInterval(() => {
          if (!isModalOpen && !isDragging) { renderBoard(); populateSprintFilter(); }
        }, ms);
      }
    }

    refreshBtn.addEventListener('click', async () => {
      await renderBoard();
      await populateSprintFilter();
      showToast('Refreshed');
    });
    autoRefreshSelect.addEventListener('change', () => {
      localStorage.setItem('pi-board-auto-refresh', autoRefreshSelect.value);
      startAutoRefresh();
    });

    async function renderStats() {
      await fetchSprints();
      const container = document.getElementById('statsContent');
      const active = allSprints.find(s => s.status === 'active');
      let html = '';

      if (active) {
        const { stats } = await api(`/api/sprints/${active.id}/stats`);
        const { burndown } = await api(`/api/sprints/${active.id}/burndown`);
        html += `<h3 style="margin:0.5rem 0 0.25rem">Active Sprint: ${escapeHtml(active.name)}</h3>`;
        html += `<div style="font-size:0.85rem;margin-bottom:0.5rem">Tasks: ${stats.completed}/${stats.total} (${stats.completion_pct}%) — Estimate: ${stats.completed_estimate}/${stats.total_estimate} pts (${stats.estimate_completion_pct}%)</div>`;
        if (burndown.completions.length > 0) {
          html += `<div style="margin:0.5rem 0"><strong>Daily Completions</strong></div>`;
          html += `<div style="display:flex;align-items:flex-end;gap:0.3rem;height:100px;margin-bottom:0.5rem">`;
          const max = Math.max(...burndown.completions.map(c => c.count), 1);
          for (const c of burndown.completions) {
            const pct = (c.count / max) * 100;
            html += `<div style="flex:1;display:flex;flex-direction:column;align-items:center;gap:0.2rem"><div style="width:100%;background:#38bdf8;border-radius:0.25rem;height:${pct}%"></div><span style="font-size:0.6rem;white-space:nowrap">${c.day.slice(5)}</span></div>`;
          }
          html += `</div>`;
        }
      } else {
        html += `<p style="opacity:0.7">No active sprint.</p>`;
      }

      const { workload } = await api('/api/workload');
      html += `<h3 style="margin:0.75rem 0 0.25rem">Assignee Workload</h3>`;
      html += `<table style="width:100%;font-size:0.85rem;border-collapse:collapse"><thead><tr style="border-bottom:1px solid #334155"><th style="text-align:left;padding:0.3rem">Name</th><th style="text-align:right;padding:0.3rem">Tasks</th><th style="text-align:right;padding:0.3rem">Points</th></tr></thead><tbody>`;
      for (const w of workload) {
        html += `<tr><td style="padding:0.3rem"><span class="assignee-chip" style="background:${w.color}22;color:${w.color}">${escapeHtml(w.name)}</span></td><td style="text-align:right;padding:0.3rem">${w.task_count}</td><td style="text-align:right;padding:0.3rem">${w.total_estimate}</td></tr>`;
      }
      html += `</tbody></table>`;
      container.innerHTML = html;
    }
    document.getElementById('statsBtn').addEventListener('click', () => { renderStats(); openModal('statsModalOverlay'); });
    document.getElementById('closeStatsBtn').addEventListener('click', () => closeModal('statsModalOverlay'));

    document.getElementById('exportJsonBtn').addEventListener('click', () => {
      window.location.href = '/api/export/json';
    });
    document.getElementById('exportCsvBtn').addEventListener('click', () => {
      const params = new URLSearchParams();
      if (sprintFilterEl.value) params.set('sprint_id', sprintFilterEl.value);
      if (document.getElementById('assigneeFilter').value) params.set('assignee_id', document.getElementById('assigneeFilter').value);
      if (document.getElementById('labelFilter').value) params.set('label_ids', document.getElementById('labelFilter').value);
      if (document.getElementById('archivedToggle').checked) params.set('archived', '1');
      window.location.href = '/api/export/csv?' + params.toString();
    });
    document.getElementById('importJsonInput').addEventListener('change', async (e) => {
      const file = e.target.files[0];
      if (!file) return;
      if (!confirm('This will REPLACE all current board data. Continue?')) { e.target.value = ''; return; }
      try {
        const text = await file.text();
        const data = JSON.parse(text);
        await api('/api/import/json', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(data) });
        showToast('Import successful');
        await renderBoard();
        await populateSprintFilter();
        await populateAssigneeFilter();
        await populateLabelFilter();
      } catch (err) {
        showToast('Import failed: ' + err.message);
      }
      e.target.value = '';
    });

    // Click outside modal to close
    document.querySelectorAll('.modal-overlay').forEach(overlay => {
      overlay.addEventListener('click', (e) => {
        if (e.target === overlay) {
          overlay.classList.remove('open');
          isModalOpen = false;
          if (overlay.id === 'taskModalOverlay' && window.location.pathname.startsWith('/task/')) {
            window.history.pushState({}, '', '/');
          }
        }
      });
    });

    // Keyboard shortcuts
    document.addEventListener('keydown', (e) => {
      if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA' || e.target.tagName === 'SELECT') return;
      if (e.key === 'n' || e.key === 'N') {
        e.preventDefault();
        document.getElementById('addTaskBtn').click();
      }
      if (e.key === 'Escape') {
        document.querySelectorAll('.modal-overlay.open').forEach(m => m.classList.remove('open'));
        isModalOpen = false;
        if (window.location.pathname !== '/') {
          window.history.pushState({}, '', '/');
        }
      }
      if ((e.key === 'e' || e.key === 'E') && isModalOpen && document.getElementById('taskModalOverlay').classList.contains('open')) {
        e.preventDefault();
        if (document.getElementById('taskView').style.display !== 'none') {
          document.getElementById('editTaskBtn').click();
        }
      }
      if ((e.key === 'd' || e.key === 'D') && isModalOpen && document.getElementById('taskModalOverlay').classList.contains('open')) {
        e.preventDefault();
        if (confirm('Delete this task?')) {
          document.getElementById('deleteTaskBtn').click();
        }
      }
      if (e.key === '?') {
        e.preventDefault();
        alert('Keyboard shortcuts:\nN = New task\nE = Edit task (when modal open)\nD = Delete task (when modal open)\nEsc = Close modal\n? = This help');
      }
    });

    // Client-side routing
    function handleRoute() {
      const match = window.location.pathname.match(/^\/task\/(\d+)$/);
      if (match) {
        openTaskModal(Number(match[1]));
      }
      // Notify parent dashboard of navigation (for :1111 URL sync)
      if (window.parent !== window) {
        window.parent.postMessage({ type: 'pi-board-navigate', path: window.location.pathname }, '*');
      }
    }

    // Intercept card title link clicks for SPA behavior
    document.addEventListener('click', (e) => {
      const link = e.target.closest('a[href^="/task/"]');
      if (link) {
        e.preventDefault();
        window.history.pushState({}, '', link.getAttribute('href'));
        handleRoute();
      }
    });

    // Handle browser back/forward
    window.addEventListener('popstate', handleRoute);

    // --- Project Sidebar ---
    let projectLabels = [];
    let sidebarPollInterval = null;
    
    function getProjectInitial(name) {
      return name ? name.charAt(0).toUpperCase() : '?';
    }
    
    async function refreshSidebar() {
      await fetchLabels();
      // A "project" is any label — show them all as sidebar icons
      const labels = allLabels || [];
      const container = document.getElementById('sidebarIcons');
      const activeLabelId = document.getElementById('labelFilter').value;
      
      container.innerHTML = labels.map(l => `
        <div class="sidebar-icon${String(l.id) === activeLabelId ? ' active' : ''}" 
             style="background:${escapeHtml(l.color)}22;color:${escapeHtml(l.color)};border:1px solid ${escapeHtml(l.color)}44"
             data-label-id="${l.id}"
             data-label-name="${escapeHtml(l.name)}"
             title="${escapeHtml(l.name)}">
          <span>${getProjectInitial(l.name)}</span>
          <span class="tooltip">${escapeHtml(l.name)}</span>
        </div>
      `).join('');
      
      // Click handler: filter board by that label
      container.querySelectorAll('.sidebar-icon').forEach(icon => {
        icon.addEventListener('click', () => {
          const labelId = icon.dataset.labelId;
          const labelFilter = document.getElementById('labelFilter');
          if (labelFilter.value === labelId) {
            labelFilter.value = '';
          } else {
            labelFilter.value = labelId;
          }
          renderBoard();
          refreshSidebar();
        });
      });
      
      projectLabels = labels;
    }
    
    function startSidebarPoll() {
      if (sidebarPollInterval) clearInterval(sidebarPollInterval);
      sidebarPollInterval = setInterval(refreshSidebar, 5000);
    }
    
    document.body.classList.add('has-sidebar');

    // Initial load
    (async () => {
      await populateSprintFilter();
      await populateAssigneeFilter();
      await populateLabelFilter();
      await renderBoard();
      startAutoRefresh();
      startSidebarPoll();
      await refreshSidebar();
      handleRoute();
    })();
  </script>
</body>
</html>
